<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometragem - Cadastro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        img { width: 180px; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background-color: #28a745; color: white; border: none; }
        .btn-save:hover { background-color: #218838; }
        .btn-pdf { background-color: #e67e22; color: white; border: none; margin-top: 10px; }
        .btn-pdf:hover { background-color: #f39c12; }
        .btn-clear { background-color: #dc3545; color: white; border: none; font-size: 16px; margin-top: 10px; }
        .btn-clear:hover { background-color: #bd2130; }
        .btn-nav { background-color: #007bff; color: white; border: none; }
        
        #subEtapa { background-color: #fff3cd; border: 2px solid #ffc107; font-weight: bold; color: #856404; }
        #pilotoSelect { background-color: #e2f0d9; border: 2px solid #385723; font-weight: bold; }
    </style>
</head>
<body>

    <div id="conteudo-sistema">
        <div class="card">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" alt="Logo">
            
            <input type="text" id="etapa" placeholder="Nome da Etapa (ex: GP Brasil)" oninput="atualizarEtapaFirebase()">
            
            <!-- SELETOR DE ETAPA DA PROVA -->
            <select id="subEtapa">
                <option value="e1">ETAPA 1 (Lançar Voltas 1 e 2)</option>
                <option value="e2">ETAPA 2 (Lançar Voltas 1 e 2)</option>
            </select>

            <!-- SELETOR DE CATEGORIA -->
            <select id="categoria" onchange="carregarPilotosPorCategoria()">
                <option value="PRODUCTION">PRODUCTION</option>
                <option value="SUPER PRODUCTION">SUPER PRODUCTION</option>
                <option value="PROTOTIPO">PROTOTIPO</option>
                <option value="UTV">UTV</option>
                <option value="INICIANTE">INICIANTE</option>
            </select>

            <!-- SELETOR DINÂMICO DE PILOTOS -->
            <select id="pilotoSelect">
                <option value="">Carregando pilotos...</option>
            </select>
            
            <input type="text" id="tempo" placeholder="00:00:000" maxlength="9">

            <button class="btn-save" onclick="enviarDados()">SALVAR VOLTA</button>
            <button class="btn-pdf" onclick="exportarPDF()">RELATÓRIO DE PROVA</button>
            
            <hr>
            <button class="btn-nav" onclick="window.location.href='cadastro_pilotos.html'" style="background-color: #a5a5a5;">CADASTRAR PILOTOS</button>
            <button class="btn-nav" onclick="window.location.href='alteracao.html'">ALTERAR DADOS</button>
            <button class="btn-nav" onclick="window.location.href='resultados.html'" style="background-color: #6c757d;">VER RESULTADOS</button>
            
            <button class="btn-clear" onclick="limparBanco()">LIMPAR TODOS OS DADOS</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4ajZM_W0_qGOlrlRoPn6DUsUBUm4qAcc",
            authDomain: "crono-rrb.firebaseapp.com",
            databaseURL: "https://crono-rrb-default-rtdb.firebaseio.com",
            projectId: "crono-rrb",
            storageBucket: "crono-rrb.firebasestorage.app",
            messagingSenderId: "1472207720",
            appId: "1:1472207720:web:11502aed4117b1fda714dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Escuta o nome da etapa
        db.ref('configuracao/etapaAtual').on('value', (snapshot) => {
            if(snapshot.exists()) {
                document.getElementById('etapa').value = snapshot.val();
            }
        });

        function atualizarEtapaFirebase() {
            const nome = document.getElementById('etapa').value;
            db.ref('configuracao').update({ etapaAtual: nome });
        }

        // FUNÇÃO CORRIGIDA: Sintaxe limpa e sem travas
        function carregarPilotosPorCategoria() {
            const catSelecionada = document.getElementById('categoria').value;
            const seletorPilotos = document.getElementById('pilotoSelect');
            seletorPilotos.innerHTML = "<option value=''>Carregando pilotos...</option>";

            db.ref('lista_pilotos').orderByChild('categoria').equalTo(catSelecionada).once('value')
                .then((snapshot) => {
                    seletorPilotos.innerHTML = "";
                    const dados = snapshot.val();
                    
                    if (!dados) {
                        seletorPilotos.innerHTML = "<option value=''>NENHUM PILOTO CADASTRADO</option>";
                        return;
                    }

                    seletorPilotos.innerHTML = "<option value=''>SELECIONE O PILOTO...</option>";
                    for (let key in dados) {
                        if (dados[key] && dados[key].nome) {
                            seletorPilotos.innerHTML += `<option value="${dados[key].nome}">${dados[key].nome}</option>`;
                        }
                    }
                })
                .catch((err) => {
                    console.error("Erro ao carregar pilotos", err);
                    seletorPilotos.innerHTML = "<option value=''>ERRO AO CARREGAR</option>";
                });
        }

        // Máscara de tempo
        document.getElementById('tempo').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) {
                v = v.replace(/(\d{2})(\d{2})(\d{3})/, "$1:$2:$3");
            } else if (v.length > 2) {
                v = v.replace(/(\d{2})(\d{2})/, "$1:$2");
            }
            e.target.value = v;
        });

        async function enviarDados() {
            const etapa = document.getElementById('etapa').value;[cite: 2]
            const subEtapa = document.getElementById('subEtapa').value; 
            const categoria = document.getElementById('categoria').value;[cite: 2]
            const piloto = document.getElementById('pilotoSelect').value; 
            const tempo = document.getElementById('tempo').value;[cite: 2]

            if (!etapa || !piloto || piloto === "SELECIONE O PILOTO..." || piloto === "NENHUM PILOTO CADASTRADO" || tempo.length < 9) {[cite: 2]
                alert("Por favor, selecione um piloto válido e preencha o tempo corretamente (00:00:000).");
                return;
            }

            db.ref('configuracao').update({ subEtapaAtiva: subEtapa });

            const idPiloto = btoa(categoria + "_" + piloto).replace(/=/g, "");[cite: 2]
            const ref = db.ref('pilotos/' + idPiloto);[cite: 2]

            const snapshot = await ref.once('value');[cite: 2]
            const pData = snapshot.val();[cite: 2]

            const campoV1 = `${subEtapa}_v1`;
            const campoV2 = `${subEtapa}_v2`;

            if (!pData) {
                let novoPiloto = {
                    categoria: categoria,[cite: 2]
                    piloto: piloto,[cite: 2]
                    e1_v1: "00:00:000", e1_v2: "00:00:000",
                    e2_v1: "00:00:000", e2_v2: "00:00:000"
                };
                novoPiloto[campoV1] = tempo;
                await ref.set(novoPiloto);
                alert(`Volta 1 da ${subEtapa.toUpperCase()} salva para ${piloto}!`);
            } else {
                if (!pData[campoV1] || pData[campoV1] === "00:00:000") {
                    let dados = {}; dados[campoV1] = tempo;
                    await ref.update(dados);
                    alert(`Volta 1 da ${subEtapa.toUpperCase()} salva para ${piloto}!`);
                } else if (!pData[campoV2] || pData[campoV2] === "00:00:000") {
                    let dados = {}; dados[campoV2] = tempo;
                    await ref.update(dados);
                    alert(`Volta 2 da ${subEtapa.toUpperCase()} salva para ${piloto}!`);
                } else {
                    alert(`Este piloto já possui as 2 voltas registradas na ${subEtapa.toUpperCase()}!`);
                }
            }
            document.getElementById('tempo').value = "";[cite: 2]
        }

        async function limparBanco() {
            const senha = prompt("CUIDADO: Isso apagará OS TEMPOS das voltas e configurações (Os cadastros de pilotos continuam).\nDigite a senha para confirmar:");
            if (senha === "75999862628") {
                try {
                    await db.ref('pilotos').remove();
                    await db.ref('configuracao').remove();
                    alert("Os tempos do banco foram resetados com sucesso!");
                    window.location.reload();
                } catch (error) {
                    alert("Erro ao tentar limpar o banco: " + error.message);
                }
            } else if (senha !== null) {
                alert("Senha incorreta!");
            }
        }

        function tParaMs(t) {
            if (!t || t === "00:00:000") return 0;
            const p = t.split(':');
            return (parseInt(p[0]) * 60000) + (parseInt(p[1]) * 1000) + parseInt(p[2]);
        }
        
        function msParaT(ms) {
            if (ms === 0) return "00:00:000";
            const min = Math.floor(ms / 60000);
            const seg = Math.floor((ms % 60000) / 1000);
            const mil = ms % 1000;
            return `${String(min).padStart(2,'0')}:${String(seg).padStart(2,'0')}:${String(mil).padStart(3,'0')}`;
        }

        async function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            try {
                const snapshot = await db.ref('pilotos').once('value');[cite: 2]
                const data = snapshot.val();[cite: 2]
                const etapaSnap = await db.ref('configuracao/etapaAtual').once('value');[cite: 2]
                const nomeEtapa = etapaSnap.val() || "Geral";[cite: 2]

                if (!data) { 
                    alert("Não há dados de tempos registrados para exportar."); 
                    return; 
                }

                let listaPilotos = [];
                for (let k in data) {
                    const p = data[k];
                    const e1v1 = p.e1_v1 || "00:00:000";
                    const e1v2 = p.e1_v2 || "00:00:000";
                    const e2v1 = p.e2_v1 || "00:00:000";
                    const e2v2 = p.e2_v2 || "00:00:000";

                    const totalE1Ms = tParaMs(e1v1) + tParaMs(e1v2);[cite: 2]
                    const totalE2Ms = tParaMs(e2v1) + tParaMs(e2v2);[cite: 2]
                    const somaGeralMs = totalE1Ms + totalE2Ms;

                    listaPilotos.push({ 
                        ...p, 
                        tempoE1Str: msParaT(totalE1Ms),
                        tempoE2Str: msParaT(totalE2Ms),
                        totalGeralMs: somaGeralMs, 
                        totalGeralStr: msParaT(somaGeralMs) 
                    });
                }

                doc.setFillColor(40, 44, 52);
                doc.rect(10, 10, 190, 28, 'F');

                doc.setFontSize(16);[cite: 2]
                doc.setTextColor(255, 255, 255);
                doc.setFont("helvetica", "bold");
                doc.text(`RELATÓRIO DE PROVA - RACE KRONO`, 15, 22);

                doc.setFontSize(11);[cite: 2]
                doc.setFont("helvetica", "normal");
                doc.text(`Etapa: ${nomeEtapa.toUpperCase()}`, 15, 32);[cite: 2]
                doc.text(`Gerado em: ${new Date().toLocaleString()}`, 130, 32);
                
                let y = 48;[cite: 2]
                const cats = ["PRODUCTION", "SUPER PRODUCTION", "PROTOTIPO", "UTV", "INICIANTE"];[cite: 2]

                cats.forEach(cat => {
                    let filtrados = listaPilotos.filter(p => p.categoria === cat).sort((a,b) => a.totalGeralMs - b.totalGeralMs);[cite: 2]
                    if (filtrados.length > 0) {
                        doc.setFontSize(13);[cite: 2]
                        doc.setTextColor(40, 40, 40);[cite: 2]
                        doc.setFont("helvetica", "bold");
                        doc.text(`CATEGORIA: ${cat}`, 10, y);[cite: 2]
                        
                        const rows = filtrados.map((p, i) => [`${i+1}º`, p.piloto, p.tempoE1Str, p.tempoE2Str, p.totalGeralStr]);
                        
                        doc.autoTable({
                            startY: y + 4,
                            head: [['Pos', 'Piloto', 'Total Etapa 01', 'Total Etapa 02', 'Total Acumulado']],
                            body: rows,
                            theme: 'grid',
                            headStyles: { fillColor: [243, 156, 18], textColor: [255, 255, 255], fontStyle: 'bold' },[cite: 2]
                            styles: { fontSize: 10, font: 'helvetica' }[cite: 2]
                        });
                        y = doc.lastAutoTable.finalY + 14;[cite: 2]
                    }
                });
                
                doc.save(`Resultado_Acumulado_${nomeEtapa.replace(/\s+/g, '_')}.pdf`);[cite: 2]
            } catch (err) {
                alert("Erro ao gerar PDF: " + err.message);
            }
        }

        // Executa a primeira carga com segurança ao carregar a página
        carregarPilotosPorCategoria();
    </script>
</body>
</html>
