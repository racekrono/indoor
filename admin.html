<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometragem - Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        img { width: 180px; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background-color: #28a745; color: white; border: none; }
        .btn-save:hover { background-color: #218838; }
        .btn-pdf { background-color: #e67e22; color: white; border: none; margin-top: 10px; }
        .btn-pdf:hover { background-color: #f39c12; }
        .btn-clear { background-color: #dc3545; color: white; border: none; font-size: 16px; margin-top: 10px; }
        .btn-clear:hover { background-color: #bd2130; }
        .btn-nav { background-color: #007bff; color: white; border: none; }
        
        #subEtapa { background-color: #fff3cd; border: 2px solid #ffc107; font-weight: bold; color: #856404; }
        #pilotoSelect { background-color: #e2f0d9; border: 2px solid #385723; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" alt="Logo">
        
        <input type="text" id="etapa" placeholder="Nome da Etapa (ex: GP Brasil)" oninput="atualizarEtapaFirebase()">
        
        <select id="subEtapa">
            <option value="e1">ETAPA 1 (Lançar Voltas 1 e 2)</option>
            <option value="e2">ETAPA 2 (Lançar Voltas 1 e 2)</option>
        </select>

        <select id="categoria" onchange="carregarPilotosPorCategoria()">
            <option value="PRODUCTION">PRODUCTION</option>
            <option value="SUPER PRODUCTION">SUPER PRODUCTION</option>
            <option value="PROTOTIPO">PROTOTIPO</option>
            <option value="UTV">UTV</option>
            <option value="INICIANTE">INICIANTE</option>
        </select>

        <select id="pilotoSelect">
            <option value="">Carregando pilotos...</option>
        </select>
        
        <input type="text" id="tempo" placeholder="00:00:000" maxlength="9">

        <button class="btn-save" onclick="enviarDados()">SALVAR VOLTA</button>
        <button class="btn-pdf" onclick="exportarPDF()">RELATÓRIO DE PROVA</button>
        
        <hr>
        <button class="btn-nav" onclick="window.location.href='cadastro_pilotos.html'" style="background-color: #a5a5a5;">CADASTRAR PILOTOS</button>
        <button class="btn-nav" onclick="window.location.href='alteracao.html'">ALTERAR DADOS</button>
        <button class="btn-nav" onclick="window.location.href='index.html'" style="background-color: #6c757d;">VER RESULTADOS</button>
        
        <button class="btn-clear" onclick="limparBanco()">LIMPAR TODOS OS DADOS</button>
    </div>

    <!-- Scripts do Firebase compatíveis -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Configuração do seu Firebase
        var firebaseConfig = {
            apiKey: "AIzaSyC4ajZM_W0_qGOlrlRoPn6DUsUBUm4qAcc",
            authDomain: "crono-rrb.firebaseapp.com",
            databaseURL: "https://crono-rrb-default-rtdb.firebaseio.com",
            projectId: "crono-rrb",
            storageBucket: "crono-rrb.firebasestorage.app",
            messagingSenderId: "1472207720",
            appId: "1:1472207720:web:11502aed4117b1fda714dd"
        };
        
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        // Monitorar nome da etapa
        db.ref('configuracao/etapaAtual').on('value', function(snapshot) {
            if(snapshot.exists()) {
                document.getElementById('etapa').value = snapshot.val();
            }
        });

        function atualizarEtapaFirebase() {
            var nome = document.getElementById('etapa').value;
            db.ref('configuracao').update({ etapaAtual: nome });
        }

        // Carrega os pilotos da categoria selecionada
        function carregarPilotosPorCategoria() {
            var catSelecionada = document.getElementById('categoria').value;
            var seletorPilotos = document.getElementById('pilotoSelect');
            seletorPilotos.innerHTML = "<option value=''>Carregando pilotos...</option>";

            db.ref('lista_pilotos').orderByChild('categoria').equalTo(catSelecionada).once('value')
                .then(function(snapshot) {
                    seletorPilotos.innerHTML = "";
                    var dados = snapshot.val();
                    
                    if (!dados) {
                        seletorPilotos.innerHTML = "<option value=''>NENHUM PILOTO CADASTRADO</option>";
                        return;
                    }

                    seletorPilotos.innerHTML = "<option value=''>SELECIONE O PILOTO...</option>";
                    for (var key in dados) {
                        if (dados[key] && dados[key].nome) {
                            seletorPilotos.innerHTML += "<option value='" + dados[key].nome + "'>" + dados[key].nome + "</option>";
                        }
                    }
                })
                .catch(function(err) {
                    console.error(err);
                    seletorPilotos.innerHTML = "<option value=''>ERRO AO CARREGAR</option>";
                });
        }

        // Máscara de tempo (00:00:000)
        document.getElementById('tempo').addEventListener('input', function (e) {
            var v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) {
                v = v.replace(/(\d{2})(\d{2})(\d{3})/, "$1:$2:$3");
            } else if (v.length > 2) {
                v = v.replace(/(\d{2})(\d{2})/, "$1:$2");
            }
            e.target.value = v;
        });

        // Salvar os tempos das voltas
        function enviarDados() {
            var etapa = document.getElementById('etapa').value;
            var subEtapa = document.getElementById('subEtapa').value; 
            var categoria = document.getElementById('categoria').value;
            var piloto = document.getElementById('pilotoSelect').value; 
            var tempo = document.getElementById('tempo').value;

            if (!etapa || !piloto || piloto === "" || piloto === "SELECIONE O PILOTO..." || tempo.length < 9) {
                alert("Selecione um piloto válido e preencha o tempo corretamente.");
                return;
            }

            db.ref('configuracao').update({ subEtapaAtiva: subEtapa });

            var idPiloto = btoa(categoria + "_" + piloto).replace(/=/g, "");
            var ref = db.ref('pilotos/' + idPiloto);

            ref.once('value').then(function(snapshot) {
                var pData = snapshot.val();
                var campoV1 = subEtapa + "_v1";
                var campoV2 = subEtapa + "_v2";

                if (!pData) {
                    var novoPiloto = {
                        categoria: categoria,
                        piloto: piloto,
                        e1_v1: "00:00:000", e1_v2: "00:00:000",
                        e2_v1: "00:00:000", e2_v2: "00:00:000"
                    };
                    novoPiloto[campoV1] = tempo;
                    return ref.set(novoPiloto).then(function() {
                        alert("Volta 1 da " + subEtapa.toUpperCase() + " salva para " + piloto + "!");
                    });
                } else {
                    var dados = {};
                    if (!pData[campoV1] || pData[campoV1] === "00:00:000") {
                        dados[campoV1] = tempo;
                        return ref.update(dados).then(function() {
                            alert("Volta 1 da " + subEtapa.toUpperCase() + " salva para " + piloto + "!");
                        });
                    } else if (!pData[campoV2] || pData[campoV2] === "00:00:000") {
                        dados[campoV2] = tempo;
                        return ref.update(dados).then(function() {
                            alert("Volta 2 da " + subEtapa.toUpperCase() + " salva para " + piloto + "!");
                        });
                    } else {
                        alert("Este piloto já possui as 2 voltas registradas nesta etapa!");
                    }
                }
            }).then(function() {
                document.getElementById('tempo').value = "";
            }).catch(function(err) {
                alert("Erro ao salvar: " + err.message);
            });
        }

        // Limpar os tempos das voltas
        function limparBanco() {
            var senha = prompt("CUIDADO: Isso apagará OS TEMPOS das voltas.\nDigite a senha para confirmar:");
            if (senha === "75999862628") {
                db.ref('pilotos').remove()
                    .then(function() {
                        return db.ref('configuracao').remove();
                    })
                    .then(function() {
                        alert("Os tempos foram resetados com sucesso!");
                        window.location.reload();
                    })
                    .catch(function(error) {
                        alert("Erro ao limpar banco: " + error.message);
                    });
            } else if (senha !== null) {
                alert("Senha incorreta!");
            }
        }

        // Conversões de tempo
        function tParaMs(t) {
            if (!t || t === "00:00:000") return 0;
            var p = t.split(':');
            return (parseInt(p[0]) * 60000) + (parseInt(p[1]) * 1000) + parseInt(p[2]);
        }
        
        function msParaT(ms) {
            if (ms === 0) return "00:00:000";
            var min = Math.floor(ms / 60000);
            var seg = Math.floor((ms % 60000) / 1000);
            var mil = ms % 1000;
            return (min < 10 ? "0" : "") + min + ":" + (seg < 10 ? "0" : "") + seg + ":" + (mil < 100 ? (mil < 10 ? "00" : "0") : "") + mil;
        }

        // Exportação do PDF
        function exportarPDF() {
            var { jsPDF } = window.jspdf;
            var doc = new jsPDF();
            
            db.ref('pilotos').once('value').then(function(snapshot) {
                var data = snapshot.val();
                return db.ref('configuracao/etapaAtual').once('value').then(function(etapaSnap) {
                    var nomeEtapa = etapaSnap.val() || "Geral";

                    if (!data) { 
                        alert("Não há dados de tempos registrados para exportar."); 
                        return; 
                    }

                    var listaPilotos = [];
                    for (var k in data) {
                        var p = data[k];
                        var e1v1 = p.e1_v1 || "00:00:000";
                        var e1v2 = p.e1_v2 || "00:00:000";
                        var e2v1 = p.e2_v1 || "00:00:000";
                        var e2v2 = p.e2_v2 || "00:00:000";

                        var totalE1Ms = tParaMs(e1v1) + tParaMs(e1v2);
                        var totalE2Ms = tParaMs(e2v1) + tParaMs(e2v2);
                        var somaGeralMs = totalE1Ms + totalE2Ms;

                        p.tempoE1Str = msParaT(totalE1Ms);
                        p.tempoE2Str = msParaT(totalE2Ms);
                        p.totalGeralMs = somaGeralMs;
                        p.totalGeralStr = msParaT(somaGeralMs);

                        listaPilotos.push(p);
                    }

                    doc.setFillColor(40, 44, 52);
                    doc.rect(10, 10, 190, 28, 'F');

                    doc.setFontSize(16);
                    doc.setTextColor(255, 255, 255);
                    doc.text("RELATÓRIO DE PROVA - RACE KRONO", 15, 22);

                    doc.setFontSize(11);
                    doc.text("Etapa: " + nomeEtapa.toUpperCase(), 15, 32);
                    doc.text("Gerado em: " + new Date().toLocaleString(), 130, 32);
                    
                    var y = 48;
                    var cats = ["PRODUCTION", "SUPER PRODUCTION", "PROTOTIPO", "UTV", "INICIANTE"];

                    cats.forEach(function(cat) {
                        var filtrados = listaPilotos.filter(function(p) { return p.categoria === cat; });
                        filtrados.sort(function(a, b) { return a.totalGeralMs - b.totalGeralMs; });
                        
                        if (filtrados.length > 0) {
                            doc.setFontSize(13);
                            doc.setTextColor(40, 40, 40);
                            doc.text("CATEGORIA: " + cat, 10, y);
                            
                            var rows = filtrados.map(function(p, i) { 
                                return [(i+1) + "º", p.piloto, p.tempoE1Str, p.tempoE2Str, p.totalGeralStr]; 
                            });
                            
                            doc.autoTable({
                                startY: y + 4,
                                head: [['Pos', 'Piloto', 'Total Etapa 01', 'Total Etapa 02', 'Total Acumulado']],
                                body: rows,
                                theme: 'grid',
                                headStyles: { fillColor: [243, 156, 18], textColor: [255, 255, 255] },
                                styles: { fontSize: 10 }
                            });
                            y = doc.lastAutoTable.finalY + 14;
                        }
                    });
                    
                    doc.save("Resultado_Acumulado_" + nomeEtapa.replace(/\s+/g, '_') + ".pdf");
                });
            }).catch(function(err) {
                alert("Erro ao gerar PDF: " + err.message);
            });
        }

        // Executar carga inicial ao abrir a página
        carregarPilotosPorCategoria();
    </script>
</body>
</html>
